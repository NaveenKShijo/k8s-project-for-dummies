# It is a config file to configure the behavior of prometheus

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 8s

scrape_configs:
  - job_name: 'order_service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8000']

  - job_name: 'user_service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8001']