apiVersion: v1
kind: Service 

metadata: 
  name: rabbitmq

spec:
  selector:
    app: rabbit-pod
  
  ports:
    - name: ui
      port: 15672
      targetPort: management-ui  # deployment.yaml holds the value for it
      nodePort: 30250

    - name: other-port
      port: 5672
      targetPort: amqp
      nodePort: 30300

  type: NodePort 
