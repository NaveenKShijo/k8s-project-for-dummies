apiVersion: apps/v1
kind: Deployment

metadata:
  name: rabbitmq

spec:
  replicas: 3

  selector:
    matchLabels:
      app: rabbit-pod
  
  template:
    metadata:
      labels:
        app: rabbit-pod

    spec: 
      containers:
        - name: rabbit-container
          image: rabbitmq:3-management 
          ports:
            - name: management-ui  # optional
              containerPort: 15672   # Rabbitmq management ui
            - name: amqp           # optional
              containerPort: 5672    # AMQP messaging port
