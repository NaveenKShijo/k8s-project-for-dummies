apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service

spec:
  replicas: 2

  # to find the pods of this deployment
  selector: 
    matchLabels:
      app: order-service
  
  # creating pods of this deployment
  template:
    metadata:
      labels:
        app: order-service 

    spec:
      containers:
        - name: order-service
          image: kubernetesproject-order-kuber:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
