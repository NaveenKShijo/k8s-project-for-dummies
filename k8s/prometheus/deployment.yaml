apiVersion: apps/v1
kind: Deployment

metadata:
  name: prometheus

spec:
  replicas: 3

  selector:
    matchLabels:
      app: prometheus-pod

  template:
    metadata:
      labels:
        app: prometheus-pod
    
    spec:
      containers:
        - name: prometheus-container
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090